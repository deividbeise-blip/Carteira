<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carteira</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #f1c835;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff5252;
      --gain: #c8f135;
      --loss: #ff5252;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
      line-height: 1;
    }

    header p {
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
    }

    .card.total {
      grid-column: 1 / -1;
      border-color: var(--accent);
      background: linear-gradient(135deg, #1a1f0a 0%, #161616 60%);
    }

    .card-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }

    .card.total .card-value {
      font-size: 2.4rem;
      color: var(--accent);
    }

    .card-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 1.4rem;
      opacity: 0.4;
    }

    .delta {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      margin-top: 6px;
      color: var(--muted);
    }

    .delta.positive { color: var(--gain); }
    .delta.negative { color: var(--loss); }

    /* Setup section */
    .section {
      max-width: 480px;
      margin: 0 auto 20px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    input[type="number"], select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    select {
      cursor: pointer;
    }

    select option { background: var(--surface2); }

    .btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      min-height: 46px;
    }

    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(0.97); }

    .btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    /* Type selector */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .type-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 6px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .type-btn:hover { border-color: var(--accent); color: var(--accent); }

    .type-btn.active-gain {
      background: rgba(200, 241, 53, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .type-btn.active-loss {
      background: rgba(255, 82, 82, 0.12);
      border-color: var(--danger);
      color: var(--danger);
    }

    .type-btn.active-set {
      background: rgba(241, 200, 53, 0.12);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* History */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-left { display: flex; flex-direction: column; gap: 3px; }

    .history-desc {
      font-size: 0.85rem;
      color: var(--text);
    }

    .history-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    .history-amount {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .history-amount.gain { color: var(--gain); }
    .history-amount.loss { color: var(--loss); }
    .history-amount.set  { color: var(--accent2); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 28px 0;
      letter-spacing: 1px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      max-width: 480px;
      margin: 0 auto 20px;
    }

    .footer-actions {
      max-width: 480px;
      margin: 20px auto 0;
      display: flex;
      justify-content: flex-end;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 50px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Setup overlay */
    .setup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 200;
      backdrop-filter: blur(4px);
    }

    .setup-box {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
    }

    .setup-box h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .setup-box p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 24px;
      font-family: 'Space Mono', monospace;
      line-height: 1.5;
    }

    .setup-fields { display: flex; flex-direction: column; gap: 14px; }

    .setup-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .setup-field input {
      width: 100%;
    }

    .setup-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<!-- Setup overlay -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>💰 Carteira</h2>
    <p>Informe seus saldos iniciais para começar o controle.</p>
    <div class="setup-fields">
      <div class="setup-field">
        <label>Dinheiro Físico (R$)</label>
        <input type="number" id="initFisico" placeholder="Ex: 150.00" min="0" step="0.01"/>
      </div>
      <div class="setup-field">
        <label>Total Geral (R$) — inclui o físico</label>
        <input type="number" id="initVirtual" placeholder="Ex: 1000.00" min="0" step="0.01"/>
      </div>
    </div>
    <button class="btn setup-btn" onclick="inicializar()">Começar →</button>
  </div>
</div>

<header>
  <h1>💰 Carteira</h1>
  <p>Controle financeiro pessoal</p>
</header>

<!-- Cards de saldo -->
<div class="cards">
  <div class="card total">
    <div class="card-label">Saldo Total + Físico</div>
    <div class="card-value" id="totalGeral">R$ 0,00</div>
    <div class="delta" id="deltaGeral"></div>
  </div>
  <div class="card">
    <span class="card-icon">💵</span>
    <div class="card-label">Físico</div>
    <div class="card-value" id="totalFisico">R$ 0,00</div>
    <div class="delta" id="deltaFisico"></div>
  </div>
  <div class="card">
    <span class="card-icon">🏦</span>
    <div class="card-label">Total Geral</div>
    <div class="card-value" id="totalVirtual">R$ 0,00</div>
    <div class="delta" id="deltaVirtual"></div>
  </div>
</div>

<!-- Lançamento -->
<div class="section">
  <div class="section-title">Novo lançamento</div>

  <div style="margin-bottom:10px;">
    <div class="type-selector">
      <div class="type-btn active-gain" id="btn-ganho"   onclick="setTipo('ganho')">✅ Ganho</div>
      <div class="type-btn"             id="btn-gasto"   onclick="setTipo('gasto')">❌ Gasto</div>
      <div class="type-btn"             id="btn-ajuste"  onclick="setTipo('ajuste')">⚙️ Ajustar</div>
    </div>
  </div>

  <div style="margin-bottom:10px; display:flex; gap:10px;">
    <div class="field">
      <label>Onde</label>
      <select id="selCarteira">
        <option value="fisico">💵 Físico</option>
        <option value="virtual">🏦 Total Geral</option>
        <option value="ambos">🔁 Ambos (físico + total)</option>
      </select>
    </div>
    <div class="field">
      <label>Valor (R$)</label>
      <input type="number" id="inputValor" placeholder="0,00" min="0" step="0.01"/>
    </div>
  </div>

  <div style="margin-bottom:12px;">
    <div class="field">
      <label>Descrição (opcional)</label>
      <input type="number" id="inputDesc" placeholder="Ex: Salário, Mercado..." 
             style="font-family:'Syne',sans-serif; font-size:0.9rem;" 
             type="text" />
    </div>
  </div>

  <button class="btn" style="width:100%;" onclick="lancar()">Lançar →</button>
</div>

<hr class="divider"/>

<!-- Histórico -->
<div class="section">
  <div class="section-title">Histórico</div>
  <div class="history-list" id="historyList">
    <div class="empty-state">Nenhum lançamento ainda.</div>
  </div>
</div>

<div class="footer-actions">
  <button class="btn danger" onclick="resetar()">Resetar tudo</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // --- Estado ---
  let state = {
    fisico: 0,
    virtual: 0,
    history: []
  };

  let tipoAtual = 'ganho';

  // --- Persistência ---
  function salvar() {
    localStorage.setItem('carteira_state', JSON.stringify(state));
  }

  function carregar() {
    const raw = localStorage.getItem('carteira_state');
    if (raw) {
      state = JSON.parse(raw);
      document.getElementById('setupOverlay').style.display = 'none';
      renderizar();
    }
  }

  // --- Inicialização ---
  function inicializar() {
    const f = parseFloat(document.getElementById('initFisico').value) || 0;
    const v = parseFloat(document.getElementById('initVirtual').value) || 0;
    state.fisico = f;
    state.virtual = v;
    state.history = [{
      tipo: 'set',
      carteira: 'ambos',
      valor: f + v,
      desc: 'Saldo inicial',
      fisico_snap: f,
      virtual_snap: v,
      total_snap: f + v,
      data: new Date().toISOString()
    }];
    salvar();
    document.getElementById('setupOverlay').style.display = 'none';
    renderizar();
    toast('Saldos configurados! ✅');
  }

  // --- Tipo ---
  function setTipo(t) {
    tipoAtual = t;
    ['ganho','gasto','ajuste'].forEach(x => {
      const el = document.getElementById('btn-' + x);
      el.className = 'type-btn';
    });
    const map = { ganho: 'active-gain', gasto: 'active-loss', ajuste: 'active-set' };
    document.getElementById('btn-' + t).className = 'type-btn ' + map[t];
  }

  // --- Lançar ---
  function lancar() {
    const valor = parseFloat(document.getElementById('inputValor').value);
    if (!valor || valor <= 0) { toast('Informe um valor válido ⚠️'); return; }
    const carteira = document.getElementById('selCarteira').value;
    const desc = document.getElementById('inputDesc').value.trim() || 
                 (tipoAtual === 'ganho' ? 'Receita' : tipoAtual === 'gasto' ? 'Despesa' : 'Ajuste');

    const prev = { fisico: state.fisico, virtual: state.virtual };

    if (tipoAtual === 'ajuste') {
      // Define o valor diretamente
      if (carteira === 'fisico')   state.fisico = valor;
      else if (carteira === 'virtual') state.virtual = valor;
      else { state.fisico = valor; state.virtual = valor; }
    } else {
      const sinal = tipoAtual === 'ganho' ? 1 : -1;
      if (carteira === 'fisico')   state.fisico   += sinal * valor;
      else if (carteira === 'virtual') state.virtual  += sinal * valor;
      else {
        const metade = valor / 2;
        state.fisico   += sinal * metade;
        state.virtual  += sinal * metade;
      }
    }

    // Não deixa ficar negativo
    state.fisico  = Math.max(0, state.fisico);
    state.virtual = Math.max(0, state.virtual);

    state.history.unshift({
      tipo: tipoAtual,
      carteira,
      valor,
      desc,
      fisico_snap:  state.fisico,
      virtual_snap: state.virtual,
      total_snap:   state.fisico + state.virtual,
      delta_fisico: state.fisico - prev.fisico,
      delta_virtual: state.virtual - prev.virtual,
      data: new Date().toISOString()
    });

    salvar();
    renderizar();

    document.getElementById('inputValor').value = '';
    document.getElementById('inputDesc').value = '';

    const total = state.fisico + state.virtual;
    toast(`Total: ${fmt(total)} | Físico: ${fmt(state.fisico)}`);
  }

  // --- Renderizar ---
  function renderizar() {
    const total = state.fisico + state.virtual;

    document.getElementById('totalGeral').textContent  = fmt(total);
    document.getElementById('totalFisico').textContent = fmt(state.fisico);
    document.getElementById('totalVirtual').textContent = fmt(total);

    // Deltas a partir do último lançamento
    if (state.history.length > 1) {
      const prev = state.history[1];
      const df = state.fisico  - (prev.fisico_snap  || 0);
      const dv = state.virtual - (prev.virtual_snap || 0);
      const dt = total - (prev.total_snap || 0);
      setDelta('deltaGeral',   dt);
      setDelta('deltaFisico',  df);
      setDelta('deltaVirtual', dv);
    }

    // History
    const list = document.getElementById('historyList');
    if (state.history.length === 0) {
      list.innerHTML = '<div class="empty-state">Nenhum lançamento ainda.</div>';
      return;
    }

    list.innerHTML = state.history.slice(0, 30).map((h, i) => {
      const tipoClass = h.tipo === 'ganho' ? 'gain' : h.tipo === 'gasto' ? 'loss' : 'set';
      const sinal = h.tipo === 'ganho' ? '+' : h.tipo === 'gasto' ? '-' : '=';
      const carteiraLabel = h.carteira === 'fisico' ? '💵 Físico' : h.carteira === 'virtual' ? '🏦 Total' : '🔁 Ambos';
      const dataFmt = new Date(h.data).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `
        <div class="history-item">
          <div class="history-left">
            <div class="history-desc">${h.desc}</div>
            <div class="history-meta">${carteiraLabel} · ${dataFmt} · Total: ${fmt(h.total_snap)}</div>
          </div>
          <div class="history-amount ${tipoClass}">${sinal} ${fmt(h.valor)}</div>
        </div>`;
    }).join('');
  }

  function setDelta(id, val) {
    const el = document.getElementById(id);
    if (Math.abs(val) < 0.01) { el.textContent = ''; return; }
    el.textContent = (val > 0 ? '▲ +' : '▼ ') + fmt(val) + ' último mov.';
    el.className = 'delta ' + (val >= 0 ? 'positive' : 'negative');
  }

  function fmt(v) {
    return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // --- Reset ---
  function resetar() {
    if (!confirm('Tem certeza? Todos os dados serão apagados.')) return;
    localStorage.removeItem('carteira_state');
    state = { fisico: 0, virtual: 0, history: [] };
    document.getElementById('setupOverlay').style.display = 'flex';
  }

  // --- Toast ---
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Fix: input de descrição estava com type number
  document.getElementById('inputDesc').removeAttribute('type');

  // --- Init ---
  carregar();
</script>
</body>
</html>
